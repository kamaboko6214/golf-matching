version: "3.9"

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-golf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golf_password}
      POSTGRES_DB: ${POSTGRES_DB:-golf_development}
      POSTGRES_HOST_AUTH_METHOD: md5      
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-golf_user} -d ${POSTGRES_DB:-golf_development}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    command: >
      bash -c "
        bundle exec rails db:create db:migrate &&
        bundle exec rails server -b 0.0.0.0
      "
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-golf_user}:${POSTGRES_PASSWORD:-golf_password}@db:5432/${POSTGRES_DB:-golf_development}
      RAILS_ENV: development
      FRONTEND_ORIGIN: http://localhost:5173
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY:-change_me_in_production}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  postgres_data:
  bundle_cache:
  node_modules:
